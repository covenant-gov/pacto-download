<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pacto</title>
    <meta
      name="description"
      content="Pacto is a free and open-source private messenger app that allows users full end-to-end encryption and transfers encrypted data via a secure, global, decentralized relay network."
    />
    <meta
      name="keywords"
      content="Pacto, private messenger, encrypted messaging, end-to-end encryption, decentralized, privacy, secure messaging, open source, no metadata, no KYC, no ads, free messaging"
    />
    <meta property="og:title" content="Pacto" />
    <meta
      property="og:description"
      content="Pacto is a free and open-source private messenger app that allows users full end-to-end encryption and transfers encrypted data via a secure, global, decentralized relay network."
    />
    <meta
      property="og:image"
      content="/assets/Pacto-Website-Metadata-Image-Preview.png"
    />
    <meta property="og:url" content="https://pactoapp.io/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pacto" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pacto" />
    <meta
      name="twitter:description"
      content="Pacto is a free and open-source private messenger app that allows users full end-to-end encryption and transfers encrypted data via a secure, global, decentralized relay network."
    />
    <meta
      name="twitter:image"
      content="/assets/Pacto-Website-Metadata-Image-Preview.png"
    />
    <meta name="theme-color" content="#7c4cff" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png" />
    <link rel="shortcut icon" href="assets/favicon/favicon.ico" />
    <link rel="manifest" href="assets/favicon/manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="main-content">
        <div class="logo-container">
          <img class="logo-icon" src="assets/logo.png" alt="Pacto logo" />
          <div class="logo-text">pacto</div>
        </div>
        <div class="tagline">
          <span class="tagline-dynamic" id="taglineDynamic"></span>
        </div>
        <a href="#" class="download-btn" id="downloadBtn"
          ><span id="downloadText">Download Pacto</span></a
        >
        <div class="platform-note" id="platformNote">
          Available for Windows, macOS, Linux & Android
        </div>
        <div class="all-downloads">
          <button class="all-downloads-toggle" id="toggleDownloads">
            Show All Downloads
          </button>
          <div class="downloads-list" id="downloadsList"></div>
        </div>
      </div>
      <div class="social-icons">
        <a
          href="https://discord.gg/trux4q8V"
          target="_blank"
          rel="noopener"
          aria-label="Discord"
          ><img src="assets/discord.svg" alt="Discord"
        /></a>
        <a
          href="https://github.com/covenant-gov/pacto-docs"
          target="_blank"
          rel="noopener"
          aria-label="GitBook"
          ><img src="assets/gitbook.svg" alt="GitBook"
        /></a>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
